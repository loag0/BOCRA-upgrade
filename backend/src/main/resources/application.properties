spring.application.name=backend

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# CORS - comma-separated origins (add your Vercel URL for production)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Rate limiting - requests per window per IP
rate-limit.requests-per-window=${RATE_LIMIT_MAX:100}
rate-limit.window-ms=${RATE_LIMIT_WINDOW_MS:60000}

# Admin emails (comma-separated) - must match NEXT_PUBLIC_ADMIN_EMAILS on the frontend
admin.emails=${ADMIN_EMAILS:}